description: >
  Publish Sonarr's own capabilities, then register with Prowlarr.
  Mirrors the Radarr post_install hook pattern exactly.
  Phase 1: wait for Sonarr's config.xml, extract and publish its real
  API key and internal URL.
  Phase 2: read Prowlarr's capabilities and register Sonarr as an
  application, passing the real API key so Prowlarr can push syncs back.
  On reconcile, read_existing_app_id short-circuits re-registration when
  the ID is already stored.

steps:
  # --- Phase 1: publish own capabilities ---

  - id: wait_for_config
    type: wait_for_file
    path_template: "<<app.install_dir>>/config/config.xml"
    poll_interval_seconds: 5
    timeout_seconds: 180
    on_error: fail
    critical: true
    description: Block until Sonarr writes its config.xml on first boot.

  - id: read_self_api_key
    type: file_read
    path_template: "<<app.install_dir>>/config/config.xml"
    regex: "<ApiKey>(.*?)</ApiKey>"
    group: 1
    bind_as: sonarr_self_api_key
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - wait_for_config
    description: Extract Sonarr's own API key from its config file.

  - id: publish_self_api_key
    type: registry_write
    key: sonarr.api_key
    value_template: "<<registry.sonarr_self_api_key>>"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - read_self_api_key
    description: Publish Sonarr's own API key so consumers can authenticate to it.

  - id: publish_self_url_internal
    type: registry_write
    key: sonarr.url_internal
    value_template: "sonarr:8989"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - publish_self_api_key
    description: >
      Publish Sonarr's Docker service hostname. Used by other containers
      to connect to Sonarr within the Docker network.

  - id: publish_self_url_external
    type: registry_write
    key: sonarr.url_external
    value_template: "host.docker.internal:<<inputs.web_ui_port>>"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - publish_self_url_internal
    description: >
      Publish Sonarr's host-accessible URL. Used by the hook executor
      when it needs to make direct HTTP calls to Sonarr's API.

  - id: wait_for_api
    type: wait_for_http
    when: "inputs.auth_type != 'none'"
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/api/v3/system/status"
    headers:
      X-Api-Key: "<<registry.sonarr_self_api_key>>"
    poll_interval_seconds: 5
    timeout_seconds: 120
    on_error: continue
    depends_on:
      - publish_self_url_external
    description: >
      Poll Sonarr's status endpoint until its HTTP API is fully ready.
      Skipped when auth type is None.

  - id: configure_auth
    type: http_request
    when: "inputs.auth_type != 'none'"
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/api/v3/config/host"
    method: PUT
    headers:
      Content-Type: application/json
      X-Api-Key: "<<registry.sonarr_self_api_key>>"
    body_template: >-
      {"id":1,"bindAddress":"*","port":<<inputs.web_ui_port>>,"sslPort":9898,"enableSsl":false,"launchBrowser":false,"authenticationMethod":"<<inputs.auth_type>>","authenticationRequired":"disabledForLocalAddresses","username":"<<inputs.auth_username>>","password":"<<inputs.auth_password>>","passwordConfirmation":"<<inputs.auth_password>>","apiKey":"<<registry.sonarr_self_api_key>>","logLevel":"info","logSizeLimit":1,"analyticsEnabled":false,"branch":"main","updateAutomatically":false,"updateMechanism":"docker","instanceName":"Sonarr","applicationUrl":"","urlBase":"","backupFolder":"Backups","backupInterval":7,"backupRetention":28,"historyCleanupDays":30}
    on_error: continue
    timeout_seconds: 30
    depends_on:
      - wait_for_api
    description: >
      Configure Sonarr authentication using the credentials supplied at
      install time. Skipped when auth type is None.

  - id: set_root_folder
    type: http_request
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/api/v3/rootfolder"
    headers:
      Content-Type: "application/json"
      X-Api-Key: "<<registry.sonarr_self_api_key>>"
    body_template: '{"path":"/media/shows"}'
    idempotency_check:
      url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/api/v3/rootfolder"
      headers:
        X-Api-Key: "<<registry.sonarr_self_api_key>>"
      match_field: path
      match_value: "/media/shows"
    on_error: continue
    critical: false
    timeout_seconds: 15
    depends_on:
      - publish_self_url_external
    description: >
      Set /media/shows as Sonarr's root folder. Idempotent — skips if
      already configured. Uses on_error: continue so a missing directory
      does not block Prowlarr registration.

  # --- Phase 2: register with Prowlarr ---

  - id: read_existing_app_id
    type: registry_read
    key: sonarr.prowlarr_app_id
    bind_as: existing_prowlarr_app_id
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - set_root_folder
    description: >
      Read persisted Prowlarr registration ID. Empty means not yet registered.
      Skips re-registration on reconcile when the ID is already stored.

  - id: read_prowlarr_api_key
    type: registry_read
    key: prowlarr.api_key
    bind_as: prowlarr_api_key
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - read_existing_app_id
    description: >
      Read Prowlarr's API key. If not found, returns CONTINUE_SUCCESS
      (job = DEGRADED). Reconcile fires when Prowlarr publishes.

  - id: read_prowlarr_url_internal
    type: registry_read
    key: prowlarr.url_internal
    bind_as: prowlarr_url_internal
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - read_prowlarr_api_key
    description: >
      Docker service hostname used in the body so Sonarr (in Docker) can
      connect back to Prowlarr for index sync.

  - id: read_prowlarr_url_external
    type: registry_read
    key: prowlarr.url_external
    bind_as: prowlarr_url_external
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - read_prowlarr_url_internal
    description: >
      Host-accessible URL used by the executor to make direct HTTP calls
      to Prowlarr's API.

  - id: register_with_prowlarr
    type: http_request
    method: POST
    url_template: "http://<<registry.prowlarr_url_external>>/api/v1/applications"
    headers:
      Content-Type: "application/json"
      X-Api-Key: "<<registry.prowlarr_api_key>>"
    body_template: '{"name":"Sonarr","syncLevel":"fullSync","implementationName":"Sonarr","implementation":"Sonarr","configContract":"SonarrSettings","fields":[{"name":"prowlarrUrl","value":"http://<<registry.prowlarr_url_external>>"},{"name":"baseUrl","value":"http://host.docker.internal:<<inputs.web_ui_port>>"},{"name":"apiKey","value":"<<registry.sonarr_self_api_key>>"},{"name":"syncCategories","value":[5000,5010,5020,5030,5040,5045,5050,5060,5070,5080]}],"tags":[]}'
    bind_response_json:
      bind_as: sonarr_prowlarr_app_id
      path: "id"
    when: "registry.prowlarr_api_key != '' and registry.existing_prowlarr_app_id == ''"
    on_error: continue
    critical: false
    timeout_seconds: 30
    depends_on:
      - read_prowlarr_url_external
    description: >
      POST to Prowlarr's applications API to register Sonarr.
      Guarded by when: skips on reconcile if already registered.

  - id: store_app_id
    type: registry_write
    key: sonarr.prowlarr_app_id
    value_template: "<<registry.sonarr_prowlarr_app_id>>"
    when: "registry.sonarr_prowlarr_app_id != ''"
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - register_with_prowlarr
    description: Persist the registration ID for use in pre_remove.

  - id: trigger_sync
    type: http_request
    method: POST
    url_template: "http://<<registry.prowlarr_url_external>>/api/v1/command"
    headers:
      Content-Type: "application/json"
      X-Api-Key: "<<registry.prowlarr_api_key>>"
    body_template: '{"name":"ApplicationIndexerSync"}'
    when: "registry.prowlarr_api_key != ''"
    on_error: continue
    critical: false
    timeout_seconds: 30
    depends_on:
      - read_prowlarr_url_external
    description: >
      Force Prowlarr to push all existing indexers to all registered apps.
      Fires whether this is a fresh registration or a reconcile of an already-
      registered instance, so indexers always reach Sonarr regardless of the
      order hooks run in a bulk install.

  - id: log_complete
    type: log
    message: "Sonarr post-install: own capabilities published and Prowlarr registration complete"
    depends_on:
      - trigger_sync
    timeout_seconds: 5
