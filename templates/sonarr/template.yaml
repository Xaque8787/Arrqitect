schema_version: 1
slug: sonarr
name: Sonarr
version: 1.0.0
description: TV series collection manager. Pairs with Prowlarr for indexer management.
icon_url: https://raw.githubusercontent.com/Sonarr/Sonarr/develop/Logo/256.png

provides: []

consumes:
  - indexer

config_schema:
  - key: host_port
    label: Host Port
    type: number
    default: 8989
    env_key: HOST_PORT
    required: true

  - key: config
    label: Config
    type: volume_mount
    default: ./config
    container_path: /config
    env_key: CONFIG_PATH
    required: true

  - key: tv
    label: TV
    type: volume_mount
    default: ./tv
    container_path: /tv
    env_key: TV_PATH
    required: true

  - key: downloads
    label: Downloads
    type: volume_mount
    default: ./downloads
    container_path: /downloads
    env_key: DOWNLOADS_PATH
    required: true

hooks:
  post_install: hooks/post_install.yaml
  pre_remove: hooks/pre_remove.yaml

compose: |
  services:
    sonarr:
      image: lscr.io/linuxserver/sonarr:latest
      container_name: sonarr
      environment:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
      volumes:
        - ${CONFIG_PATH:-./config}:/config
        - ${TV_PATH:-./tv}:/tv
        - ${DOWNLOADS_PATH:-./downloads}:/downloads
      ports:
        - ${HOST_PORT:-8989}:8989
      restart: unless-stopped
