schema_version: 2

app:
  id: sonarr
  name: Sonarr
  version: "1.2.0"
  flavor: linuxserver

description: TV series collection manager. Pairs with Prowlarr for indexer management.
icon_url: https://raw.githubusercontent.com/Sonarr/Sonarr/develop/Logo/256.png

services:
  - id: sonarr
    image:
      repository: lscr.io/linuxserver/sonarr
      tag: latest

    networking:
      ports:
        - id: web_ui
          listen_port: 8989
          protocol: http
          reachability: external

    storage:
      - id: config
        persistence: persistent
        sharing: private
        mutability: read-write
        durability: configuration
        container_path: /config

      - id: tv
        persistence: persistent
        sharing: shared
        mutability: read-write
        durability: user-data
        container_path: /tv

      - id: downloads
        persistence: persistent
        sharing: shared
        mutability: read-write
        durability: transient
        container_path: /downloads

    lifecycle:
      restart:
        behavior: persistent

provides: []

consumes:
  - key: prowlarr.api_key
    required: false
    connectivity: false

config_schema:
  - id: web_ui_port
    label: Web UI Port
    type: port
    default: 8989
    binds_to: services.sonarr.networking.ports.web_ui.published_port
    required: true
    visibility: visible
    source: user

  - id: config_path
    label: Config Path
    type: storage_path
    default: ./config
    binds_to: services.sonarr.storage.config.host_path
    required: true
    visibility: visible
    source: user

  - id: tv_path
    label: TV Path
    type: storage_path
    default: ""
    binds_to: services.sonarr.storage.tv.host_path
    required: true
    visibility: visible
    source: user

  - id: downloads_path
    label: Downloads Path
    type: storage_path
    default: ""
    binds_to: services.sonarr.storage.downloads.host_path
    required: true
    visibility: visible
    source: user

  - id: web_ui_port_env
    label: Web UI Port (env)
    type: port
    default: 8989
    binds_to: services.sonarr.env.WEB_UI_PORT
    required: false
    visibility: hidden
    source: platform

hooks:
  post_install: hooks/post_install.yaml
  pre_remove: hooks/pre_remove.yaml
