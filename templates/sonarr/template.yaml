schema_version: 2

app:
  id: sonarr
  name: Sonarr
  version: "1.7.0"
  flavor: linuxserver
  allow_custom_env: true
  allow_custom_storage: true

description: TV series collection manager. Pairs with Prowlarr for indexer management.
icon_url: https://raw.githubusercontent.com/Sonarr/Sonarr/develop/Logo/256.png

services:
  - id: sonarr
    image:
      repository: lscr.io/linuxserver/sonarr
      tag: latest

    networking:
      ports:
        - id: web_ui
          listen_port: 8989
          protocol: http
          reachability: external

    storage:
      - id: config
        persistence: persistent
        propagation: private
        mutability: read-write
        durability: configuration
        container_path: /config

      - id: media
        persistence: persistent
        propagation: rslave
        mutability: read-write
        durability: user-data
        container_path: /media

    lifecycle:
      restart:
        behavior: persistent

provides:
  - key: sonarr.api_key
    type: credential
    sensitive: true
    rotates: false
  - key: sonarr.url_internal
    type: endpoint
    sensitive: false
    rotates: false
  - key: sonarr.url_external
    type: endpoint
    sensitive: false
    rotates: false
  - key: sonarr.prowlarr_app_id
    type: metadata
    sensitive: false
    rotates: false

consumes:
  - key: prowlarr.api_key
    required: false
    connectivity: true
  - key: prowlarr.url_internal
    required: false
    connectivity: false
  - key: prowlarr.url_external
    required: false
    connectivity: false

config_schema:
  - id: web_ui_port
    label: Web UI Port
    type: port
    default: 8989
    binds_to: services.sonarr.networking.ports.web_ui.published_port
    required: true
    visibility: visible
    source: user

  - id: config_path
    label: Config Path
    type: storage_path
    default: ./config
    binds_to: services.sonarr.storage.config.host_path
    required: true
    visibility: visible
    source: user

  - id: media_path
    label: Media Path
    type: storage_path
    binds_to: services.sonarr.storage.media.host_path
    required: true
    visibility: visible
    source: platform_path
    platform_key: media_dir
    requires:
      - app: prowlarr
        action: nyaasi
        severity: warning
        message: "Install Prowlarr with an indexer for automatic series discovery"

  - id: media_propagation
    label: Media Mount Propagation
    type: string
    default: rslave
    binds_to: services.sonarr.storage.media.propagation
    required: false
    visibility: advanced
    source: user
    ui_widget: select
    allowed_values:
      - private
      - shared
      - rshared
      - slave
      - rslave

  - id: web_ui_port_env
    label: Web UI Port (env)
    type: port
    default: 8989
    binds_to: services.sonarr.env.WEB_UI_PORT
    required: false
    visibility: hidden
    source: platform

hooks:
  post_install: hooks/post_install.yaml
  pre_remove: hooks/pre_remove.yaml
