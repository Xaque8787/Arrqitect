actions:
  - id: set_root_folder
    label: Set Root Folder
    description: Configure /media/shows as Sonarr's root folder
    method: POST
    url_template: "http://<<registry.sonarr_url_external>>/api/v3/rootfolder"
    headers:
      Content-Type: application/json
      X-Api-Key: "<<registry.sonarr_api_key>>"
    idempotency_check:
      url_template: "http://<<registry.sonarr_url_external>>/api/v3/rootfolder"
      headers:
        X-Api-Key: "<<registry.sonarr_api_key>>"
      match_field: path
      match_value: "/media/shows"
    variants:
      - id: default
        label: /media/shows
        description: Set root folder to /media/shows
        idempotency_value: "/media/shows"
        enabled_by_default: true
        body_template: '{"path":"/media/shows"}'
        fields: []
