description: >
  Run Jellyfin's first-boot startup wizard, then obtain and publish an API key.

  Idempotency: the first step reads any previously published API key from the
  registry. If a key already exists, the wizard and auth steps are skipped and
  the repair path republishes the existing values. If no key exists, the full
  wizard flow runs as normal.

  Wizard sequence (all unauthenticated):
    POST /Startup/Configuration  — set locale and metadata defaults
    POST /Startup/User           — create the admin account
    POST /Startup/RemoteAccess   — enable remote access
    POST /Startup/Complete       — seal the wizard

  API key sequence (authenticated via session token):
    POST /Users/AuthenticateByName — obtain a short-lived session token
    POST /Auth/Keys                — create a permanent API key; extract Key
    registry_write                 — publish as jellyfin.api_key

steps:
  # --- Check for existing published API key (idempotency guard) ---

  - id: check_existing_api_key
    type: registry_read
    key: jellyfin.api_key
    bind_as: existing_api_key
    on_error: continue
    critical: false
    silent: true
    timeout_seconds: 10
    description: >
      Read any previously published API key. Non-empty means Jellyfin was
      already configured — wizard and auth steps cascade-skip, and the repair
      path re-publishes the existing values. Empty means fresh install.

  # --- Readiness: wait until the wizard endpoint accepts requests ---
  # Skipped when existing_api_key is non-empty.

  - id: wait_for_wizard
    type: wait_for_http
    when: "registry.existing_api_key == ''"
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Startup/User"
    method: GET
    poll_interval_seconds: 5
    timeout_seconds: 300
    on_error: fail
    critical: true
    depends_on:
      - check_existing_api_key
    description: >
      Poll GET /Startup/User until Jellyfin's startup wizard is ready to
      receive configuration. Skipped on repair when API key is already published.

  # --- Startup wizard (unauthenticated) ---
  # All depend on wait_for_wizard; they cascade-skip on repair.

  - id: wizard_configuration
    type: http_request
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Startup/Configuration"
    headers:
      Content-Type: "application/json"
    body_template: '{"UICulture":"en-US","MetadataCountryCode":"US","PreferredMetadataLanguage":"en"}'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - wait_for_wizard
    description: Apply initial locale and metadata configuration.

  - id: wizard_create_user
    type: http_request
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Startup/User"
    headers:
      Content-Type: "application/json"
    body_template: '{"Name":"<<inputs.admin_username>>","Password":"<<inputs.admin_password>>"}'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - wizard_configuration
    description: Create the admin account using the credentials from config.

  - id: wizard_remote_access
    type: http_request
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Startup/RemoteAccess"
    headers:
      Content-Type: "application/json"
    body_template: '{"EnableRemoteAccess":true,"EnableAutomaticPortMapping":false}'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - wizard_create_user
    description: Enable remote access without UPnP port mapping.

  - id: wizard_complete
    type: http_request
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Startup/Complete"
    headers:
      Content-Type: "application/json"
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - wizard_remote_access
    description: Seal the startup wizard. After this the /Startup/* endpoints are gone.

  # --- Readiness: wait for the main API to become available post-wizard ---

  - id: wait_for_api
    type: wait_for_http
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/System/Info/Public"
    method: GET
    poll_interval_seconds: 5
    timeout_seconds: 120
    on_error: fail
    critical: true
    depends_on:
      - wizard_complete
    description: >
      Wait for the main Jellyfin API to be ready after the wizard seals.
      Cascade-skipped on repair since wizard_complete is skipped.

  # --- Authenticate as admin to get a session token ---

  - id: authenticate
    type: http_request
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Users/AuthenticateByName"
    headers:
      Content-Type: "application/json"
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0"'
    body_template: '{"Username":"<<inputs.admin_username>>","Pw":"<<inputs.admin_password>>"}'
    bind_response_json:
      bind_as: jellyfin_session_token
      path: "AccessToken"
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - wait_for_api
    description: >
      Authenticate with username/password to obtain a short-lived session token.
      Cascade-skipped on repair.

  # --- Create a permanent API key ---
  # POST /Auth/Keys returns 204 No Content — the key is not in the response body.
  # We must follow up with GET /Auth/Keys and take the most recently created entry.

  - id: create_api_key
    type: http_request
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Auth/Keys?app=Arrqitect"
    headers:
      Content-Type: "application/json"
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - authenticate
    description: >
      Create a permanent named API key for Arrqitect. Returns 204 No Content —
      the key value must be fetched separately via GET /Auth/Keys.

  - id: fetch_api_keys
    type: http_request
    method: GET
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Auth/Keys"
    headers:
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    bind_response_json:
      bind_as: jellyfin_api_key
      path: "Items.0.AccessToken"
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - create_api_key
    description: >
      Fetch the list of API keys and extract the most recently created one.
      Cascade-skipped on repair.

  # --- Publish capabilities (fresh install path) ---

  - id: publish_api_key
    type: registry_write
    key: jellyfin.api_key
    value_template: "<<registry.jellyfin_api_key>>"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - fetch_api_keys
    description: Publish the permanent API key so consumers can authenticate to Jellyfin.

  - id: publish_url_internal
    type: registry_write
    key: jellyfin.url_internal
    value_template: "jellyfin:8096"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - publish_api_key
    description: Publish Jellyfin's Docker service hostname for container-to-container access.

  - id: publish_url_external
    type: registry_write
    key: jellyfin.url_external
    value_template: "host.docker.internal:<<inputs.web_ui_port>>"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - publish_url_internal
    description: Publish the host-accessible URL for hook executor HTTP calls.

  # --- Library creation ---
  # All five are conditional on the corresponding input being non-empty.
  # movies_path and tv_path are pre-populated defaults but can be cleared.
  # All five are parallel siblings — none depends on another.
  # fetch_libraries depends on all five so it always waits for the batch to
  # complete, but a skipped sibling does not cascade-skip the fetch.

  - id: create_library_movies
    type: http_request
    when: "inputs.movies_path != ''"
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Library/VirtualFolders?collectionType=movies&name=Movies&refreshLibrary=false"
    headers:
      Content-Type: "application/json"
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    body_template: '{"Paths":["/media/movies"]}'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - publish_url_external
    description: Create the Movies library pointing to /media/movies. Skipped when movies_path is blank.

  - id: create_library_tv
    type: http_request
    when: "inputs.tv_path != ''"
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Library/VirtualFolders?collectionType=tvshows&name=TV+Shows&refreshLibrary=false"
    headers:
      Content-Type: "application/json"
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    body_template: '{"Paths":["/media/shows"]}'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - publish_url_external
    description: Create the TV Shows library pointing to /media/shows. Skipped when tv_path is blank.

  - id: create_library_movies4k
    type: http_request
    when: "inputs.movies4k_path != ''"
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Library/VirtualFolders?collectionType=movies&name=4K+Movies&refreshLibrary=false"
    headers:
      Content-Type: "application/json"
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    body_template: '{"Paths":["/media/movies4k"]}'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - publish_url_external
    description: Create the 4K Movies library pointing to /media/movies4k. Skipped when movies4k_path is blank.

  - id: create_library_tv4k
    type: http_request
    when: "inputs.tv4k_path != ''"
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Library/VirtualFolders?collectionType=tvshows&name=4K+TV+Shows&refreshLibrary=false"
    headers:
      Content-Type: "application/json"
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    body_template: '{"Paths":["/media/tv4k"]}'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - publish_url_external
    description: Create the 4K TV Shows library pointing to /media/tv4k. Skipped when tv4k_path is blank.

  - id: create_library_anime
    type: http_request
    when: "inputs.anime_path != ''"
    method: POST
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Library/VirtualFolders?collectionType=tvshows&name=Anime&refreshLibrary=false"
    headers:
      Content-Type: "application/json"
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    body_template: '{"Paths":["/media/anime"]}'
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - publish_url_external
    description: Create the Anime library pointing to /media/anime. Skipped when anime_path is blank.

  - id: fetch_libraries
    type: http_request
    method: GET
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Library/VirtualFolders"
    headers:
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    bind_response_json:
      bind_as: jellyfin_movies_library_id
      path: "0.ItemId"
    on_error: continue
    critical: false
    timeout_seconds: 30
    depends_on:
      - create_library_movies
      - create_library_tv
      - create_library_movies4k
      - create_library_tv4k
      - create_library_anime
    description: Fetch the library list and extract the Movies library ID from position 0.

  - id: fetch_tv_library_id
    type: http_request
    method: GET
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/Library/VirtualFolders"
    headers:
      X-Emby-Authorization: 'MediaBrowser Client="Arrqitect", Device="Arrqitect", DeviceId="arrqitect-hook", Version="1.0", Token="<<registry.jellyfin_session_token>>"'
    bind_response_json:
      bind_as: jellyfin_tv_library_id
      path: "1.ItemId"
    on_error: fail
    critical: true
    timeout_seconds: 30
    depends_on:
      - fetch_libraries
    description: Fetch the library list and extract the TV Shows library ID from position 1.

  - id: publish_movies_library_id
    type: registry_write
    key: jellyfin.movies_library_id
    value_template: "<<registry.jellyfin_movies_library_id>>"
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - fetch_libraries
    description: Publish the Movies library ID for use by downstream hooks or actions.

  - id: publish_tv_library_id
    type: registry_write
    key: jellyfin.tv_library_id
    value_template: "<<registry.jellyfin_tv_library_id>>"
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - fetch_tv_library_id
    description: Publish the TV Shows library ID for use by downstream hooks or actions.

  - id: log_complete
    type: log
    message: "Jellyfin post-install: wizard complete, API key published, libraries created, capabilities registered"
    depends_on:
      - publish_movies_library_id
      - publish_tv_library_id
    timeout_seconds: 5

  # --- Repair path: re-publish existing values when key already exists ---
  # These steps only activate when existing_api_key is non-empty (repair).
  # On fresh install existing_api_key == '' so they are all skipped.

  - id: repair_publish_api_key
    type: registry_write
    key: jellyfin.api_key
    value_template: "<<registry.existing_api_key>>"
    when: "registry.existing_api_key != ''"
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - check_existing_api_key
    description: Re-publish the existing API key on repair (bumps capability_version to notify consumers).

  - id: repair_publish_url_internal
    type: registry_write
    key: jellyfin.url_internal
    value_template: "jellyfin:8096"
    when: "registry.existing_api_key != ''"
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - repair_publish_api_key
    description: Re-publish internal URL on repair.

  - id: repair_publish_url_external
    type: registry_write
    key: jellyfin.url_external
    value_template: "host.docker.internal:<<inputs.web_ui_port>>"
    when: "registry.existing_api_key != ''"
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - repair_publish_url_internal
    description: Re-publish external URL on repair.

  - id: repair_log_complete
    type: log
    message: "Jellyfin repair: existing API key and URLs re-published"
    when: "registry.existing_api_key != ''"
    depends_on:
      - repair_publish_url_external
    timeout_seconds: 5
