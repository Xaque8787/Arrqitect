description: >
  Publish Radarr's own capabilities, then register with Prowlarr.
  Phase 1: wait for Radarr's config.xml, extract and publish its real
  API key and internal URL so other apps can consume them.
  Phase 2: read Prowlarr's capabilities and register Radarr as an
  application, passing the real API key so Prowlarr can push syncs back.
  Guards registration behind a when: condition — if Prowlarr is not yet
  installed the steps skip and the job completes as DEGRADED. The
  reconciler fires again when Prowlarr publishes its capabilities.

steps:
  # --- Phase 1: publish own capabilities ---

  - id: wait_for_config
    type: wait_for_file
    path_template: "<<app.install_dir>>/config/config.xml"
    poll_interval_seconds: 5
    timeout_seconds: 180
    on_error: fail
    critical: true
    description: Block until Radarr writes its config.xml on first boot.

  - id: read_self_api_key
    type: file_read
    path_template: "<<app.install_dir>>/config/config.xml"
    regex: "<ApiKey>(.*?)</ApiKey>"
    group: 1
    bind_as: radarr_self_api_key
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - wait_for_config
    description: Extract Radarr's own API key from its config file.

  - id: publish_self_api_key
    type: registry_write
    key: radarr.api_key
    value_template: "<<registry.radarr_self_api_key>>"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - read_self_api_key
    description: Publish Radarr's own API key so consumers can authenticate to it.

  - id: publish_self_url_internal
    type: registry_write
    key: radarr.url_internal
    value_template: "radarr:7878"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - publish_self_api_key
    description: >
      Publish Radarr's Docker service hostname. Used by other containers
      to connect to Radarr within the Docker network.

  - id: publish_self_url_external
    type: registry_write
    key: radarr.url_external
    value_template: "host.docker.internal:<<inputs.web_ui_port>>"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - publish_self_url_internal
    description: >
      Publish Radarr's host-accessible URL. Used by the hook executor
      when it needs to make direct HTTP calls to Radarr's API.

  # --- Phase 2: register with Prowlarr ---

  - id: read_prowlarr_api_key
    type: registry_read
    key: prowlarr.api_key
    bind_as: prowlarr_api_key
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - publish_self_url_external
    description: >
      Read Prowlarr's API key. If not found, returns CONTINUE_SUCCESS
      (job = DEGRADED). Reconcile fires when Prowlarr publishes.

  - id: read_prowlarr_url_internal
    type: registry_read
    key: prowlarr.url_internal
    bind_as: prowlarr_url_internal
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - read_prowlarr_api_key
    description: >
      Docker service hostname used in the body so Radarr (in Docker) can
      connect back to Prowlarr for index sync.

  - id: read_prowlarr_url_external
    type: registry_read
    key: prowlarr.url_external
    bind_as: prowlarr_url_external
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - read_prowlarr_url_internal
    description: >
      Host-accessible URL used by the executor to make direct HTTP calls
      to Prowlarr's API.

  - id: register_with_prowlarr
    type: http_request
    method: POST
    url_template: "http://<<registry.prowlarr_url_external>>/api/v1/applications"
    headers:
      Content-Type: "application/json"
      X-Api-Key: "<<registry.prowlarr_api_key>>"
    body_template: '{"name":"Radarr","syncLevel":"fullSync","implementationName":"Radarr","implementation":"Radarr","configContract":"RadarrSettings","fields":[{"name":"prowlarrUrl","value":"http://<<registry.prowlarr_url_external>>"},{"name":"baseUrl","value":"http://host.docker.internal:<<inputs.web_ui_port>>"},{"name":"apiKey","value":"<<registry.radarr_self_api_key>>"},{"name":"syncCategories","value":[2000,2010,2020,2030,2040,2045,2050,2060,2070,2080]}],"tags":[]}'
    bind_response_json:
      bind_as: radarr_prowlarr_app_id
      path: "id"
    when: "registry.prowlarr_api_key != ''"
    on_error: continue
    critical: false
    timeout_seconds: 30
    depends_on:
      - read_prowlarr_url_external
    description: >
      POST to Prowlarr's applications API to register Radarr.
      url_template uses url_external (host-reachable); prowlarrUrl in
      the body uses url_internal (Docker-reachable) so Radarr can sync.

  - id: store_app_id
    type: registry_write
    key: radarr.prowlarr_app_id
    value_template: "<<registry.radarr_prowlarr_app_id>>"
    when: "registry.radarr_prowlarr_app_id != ''"
    on_error: continue
    critical: false
    timeout_seconds: 10
    depends_on:
      - register_with_prowlarr
    description: Persist the registration ID for use in pre_remove.

  - id: log_complete
    type: log
    message: "Radarr post-install: own capabilities published and Prowlarr registration complete"
    depends_on:
      - store_app_id
    timeout_seconds: 5
