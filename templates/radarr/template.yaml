schema_version: 1
slug: radarr
name: Radarr
version: 1.0.0
description: Movie collection manager. Pairs with Prowlarr for indexer management.
icon_url: https://raw.githubusercontent.com/Radarr/Radarr/develop/Logo/256.png

provides: []

consumes:
  - indexer

config_schema:
  - key: host_port
    label: Host Port
    type: number
    default: 7878
    env_key: HOST_PORT
    required: true

  - key: config
    label: Config
    type: volume_mount
    default: ./config
    container_path: /config
    env_key: CONFIG_PATH
    required: true

  - key: movies
    label: Movies
    type: volume_mount
    default: ./movies
    container_path: /movies
    env_key: MOVIES_PATH
    required: true

  - key: downloads
    label: Downloads
    type: volume_mount
    default: ./downloads
    container_path: /downloads
    env_key: DOWNLOADS_PATH
    required: true

hooks:
  post_install: hooks/post_install.yaml
  pre_remove: hooks/pre_remove.yaml

compose: |
  services:
    radarr:
      image: lscr.io/linuxserver/radarr:latest
      container_name: radarr
      environment:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
      volumes:
        - ${CONFIG_PATH:-./config}:/config
        - ${MOVIES_PATH:-./movies}:/movies
        - ${DOWNLOADS_PATH:-./downloads}:/downloads
      ports:
        - ${HOST_PORT:-7878}:7878
      restart: unless-stopped
