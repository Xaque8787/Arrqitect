schema_version: 2

app:
  id: radarr
  name: Radarr
  version: "1.1.0"
  flavor: linuxserver

description: Movie collection manager. Pairs with Prowlarr for indexer management.
icon_url: https://raw.githubusercontent.com/Radarr/Radarr/develop/Logo/256.png

services:
  - id: radarr
    image:
      repository: lscr.io/linuxserver/radarr
      tag: latest

    networking:
      ports:
        - id: web_ui
          listen_port: 7878
          protocol: http
          reachability: external

    storage:
      - id: config
        persistence: persistent
        sharing: private
        mutability: read-write
        durability: configuration
        container_path: /config

      - id: movies
        persistence: persistent
        sharing: shared
        mutability: read-write
        durability: user-data
        container_path: /movies

      - id: downloads
        persistence: persistent
        sharing: shared
        mutability: read-write
        durability: transient
        container_path: /downloads

    lifecycle:
      restart:
        behavior: persistent

provides: []

consumes:
  - key: prowlarr.api_key
    required: false
    connectivity: false

config_schema:
  - id: web_ui_port
    label: Web UI Port
    type: port
    default: 7878
    binds_to: services.radarr.networking.ports.web_ui.published_port
    required: true
    visibility: visible
    source: user

  - id: config_path
    label: Config Path
    type: storage_path
    default: ./config
    binds_to: services.radarr.storage.config.host_path
    required: true
    visibility: visible
    source: user

  - id: movies_path
    label: Movies Path
    type: storage_path
    default: ""
    binds_to: services.radarr.storage.movies.host_path
    required: true
    visibility: visible
    source: user
    placeholder: /data/movies

  - id: downloads_path
    label: Downloads Path
    type: storage_path
    default: ""
    binds_to: services.radarr.storage.downloads.host_path
    required: true
    visibility: visible
    source: user
    placeholder: /data/downloads

  - id: web_ui_port_env
    label: Web UI Port (env)
    type: port
    default: 7878
    binds_to: services.radarr.env.WEB_UI_PORT
    required: false
    visibility: hidden
    source: platform

hooks:
  post_install: hooks/post_install.yaml
  pre_remove: hooks/pre_remove.yaml
