schema_version: 2

app:
  id: radarr
  name: Radarr
  version: "1.7.0"
  flavor: linuxserver
  allow_custom_env: true
  allow_custom_storage: true

description: Movie collection manager. Pairs with Prowlarr for indexer management.
icon_url: https://raw.githubusercontent.com/Radarr/Radarr/develop/Logo/256.png

services:
  - id: radarr
    image:
      repository: lscr.io/linuxserver/radarr
      tag: latest

    networking:
      ports:
        - id: web_ui
          listen_port: 7878
          protocol: http
          reachability: external

    storage:
      - id: config
        persistence: persistent
        propagation: private
        mutability: read-write
        durability: configuration
        container_path: /config

      - id: media
        persistence: persistent
        propagation: rslave
        mutability: read-write
        durability: user-data
        container_path: /media

    lifecycle:
      restart:
        behavior: persistent

provides:
  - key: radarr.api_key
    type: credential
    sensitive: true
    rotates: false
  - key: radarr.url_internal
    type: endpoint
    sensitive: false
    rotates: false
  - key: radarr.url_external
    type: endpoint
    sensitive: false
    rotates: false
  - key: radarr.prowlarr_app_id
    type: metadata
    sensitive: false
    rotates: false

consumes:
  - key: prowlarr.api_key
    required: false
    connectivity: true
  - key: prowlarr.url_internal
    required: false
    connectivity: false
  - key: prowlarr.url_external
    required: false
    connectivity: false

config_schema:
  - id: web_ui_port
    label: Web UI Port
    type: port
    default: 7878
    binds_to: services.radarr.networking.ports.web_ui.published_port
    required: true
    visibility: visible
    source: user

  - id: config_path
    label: Config Path
    type: storage_path
    default: ./config
    binds_to: services.radarr.storage.config.host_path
    required: true
    visibility: visible
    source: user

  - id: media_path
    label: Media Path
    type: storage_path
    binds_to: services.radarr.storage.media.host_path
    required: true
    visibility: visible
    source: platform_path
    platform_key: media_dir
    requires:
      - app: prowlarr
        action: yts
        severity: warning
        message: "Install Prowlarr with the YTS indexer for automatic movie discovery"

  - id: media_propagation
    label: Media Mount Propagation
    type: string
    default: rslave
    binds_to: services.radarr.storage.media.propagation
    required: false
    visibility: advanced
    source: user
    ui_widget: select
    allowed_values:
      - private
      - shared
      - rshared
      - slave
      - rslave

  - id: web_ui_port_env
    label: Web UI Port (env)
    type: port
    default: 7878
    binds_to: services.radarr.env.WEB_UI_PORT
    required: false
    visibility: hidden
    source: platform

  - id: auth_type
    label: Authentication Type
    type: string
    default: "none"
    binds_to: null
    required: false
    visibility: visible
    source: user
    ui_widget: select
    allowed_values:
      - none
      - forms

  - id: auth_username
    label: Admin Username
    type: string
    default: ""
    binds_to: null
    required: false
    visibility: visible
    source: user
    placeholder: "Leave blank if auth type is None"

  - id: auth_password
    label: Admin Password
    type: string
    default: ""
    binds_to: null
    required: false
    visibility: visible
    source: user
    sensitive: true
    placeholder: "Leave blank if auth type is None"

hooks:
  post_install: hooks/post_install.yaml
  pre_remove: hooks/pre_remove.yaml
