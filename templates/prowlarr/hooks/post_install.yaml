description: >
  Publish Prowlarr's own capabilities after installation.
  Prowlarr publishes its API key and internal URL so that
  Radarr and Sonarr can consume them via their post_install hooks.

steps:
  - id: publish_url
    type: registry_write
    key: prowlarr.url_internal
    value_template: "prowlarr:9696"
    on_error: fail
    critical: true
    timeout_seconds: 10
    description: Publish Prowlarr's internal URL (container hostname:port).

  - id: publish_api_key
    type: registry_write
    key: prowlarr.api_key
    value_template: "pending_manual_setup"
    on_error: fail
    critical: true
    timeout_seconds: 10
    description: >
      Publish a placeholder API key. The real key is retrieved from
      Prowlarr's config file after it starts. For Phase 1 this
      publishes a placeholder to trigger the event system.
    depends_on:
      - publish_url

  - id: log_complete
    type: log
    message: "Prowlarr capabilities published — url_internal and api_key registered"
    depends_on:
      - publish_api_key
    timeout_seconds: 5
