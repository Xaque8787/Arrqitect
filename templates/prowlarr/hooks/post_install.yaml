description: >
  Publish Prowlarr's real capabilities after installation.
  Waits for Prowlarr to write its config file, extracts the actual
  API key, then publishes it and the internal URL to the registry.
  When the real key is published (capability_version bump), the
  reconciler automatically re-runs Radarr/Sonarr registration hooks.
  If an auth type other than None was selected at install time, also
  configures Prowlarr authentication so the first-launch auth modal
  is pre-populated.

steps:
  - id: wait_for_config
    type: wait_for_file
    path_template: "<<app.install_dir>>/config/config.xml"
    poll_interval_seconds: 5
    timeout_seconds: 180
    on_error: fail
    critical: true
    description: >
      Block until Prowlarr writes its config.xml on first boot.
      Prowlarr generates the API key and persists it here before
      its web UI becomes available.

  - id: read_api_key
    type: file_read
    path_template: "<<app.install_dir>>/config/config.xml"
    regex: "<ApiKey>(.*?)</ApiKey>"
    group: 1
    bind_as: prowlarr_real_api_key
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - wait_for_config
    description: Extract the real API key from Prowlarr's config file.

  - id: publish_api_key
    type: registry_write
    key: prowlarr.api_key
    value_template: "<<registry.prowlarr_real_api_key>>"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - read_api_key
    description: >
      Publish the real API key. The capability_version bump triggers
      reconcile jobs for all consumers (Radarr, Sonarr).

  - id: publish_url_internal
    type: registry_write
    key: prowlarr.url_internal
    value_template: "prowlarr:9696"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - publish_api_key
    description: >
      Publish Prowlarr's Docker service hostname. Used by other containers
      (Radarr, Sonarr) to connect to Prowlarr within the Docker network.

  - id: publish_url_external
    type: registry_write
    key: prowlarr.url_external
    value_template: "host.docker.internal:<<inputs.web_ui_port>>"
    on_error: fail
    critical: true
    timeout_seconds: 10
    depends_on:
      - publish_url_internal
    description: >
      Publish Prowlarr's host-accessible URL using the published port.
      Used by the hook executor (which runs on the host, not inside Docker)
      when it needs to make direct HTTP calls to Prowlarr's API.

  - id: configure_auth
    type: http_request
    when: "inputs.auth_type != 'None'"
    url_template: "http://host.docker.internal:<<inputs.web_ui_port>>/api/v1/config/host"
    method: PUT
    headers:
      Content-Type: application/json
      X-Api-Key: "<<registry.prowlarr_real_api_key>>"
    body_template: >-
      {"authenticationMethod":"<<inputs.auth_type>>","authenticationRequired":"Enabled","username":"<<inputs.auth_username>>","password":"<<inputs.auth_password>>","id":1}
    on_error: continue
    timeout_seconds: 30
    depends_on:
      - publish_api_key
    description: >
      Configure Prowlarr authentication using the credentials supplied at
      install time. Skipped when auth type is None. Uses on_error: continue
      so a failed call degrades rather than fails the install — verify the
      endpoint response in the job log and re-run if needed.

  - id: log_complete
    type: log
    message: "Prowlarr capabilities published — api_key, url_internal, and url_external registered"
    depends_on:
      - publish_url_external
    timeout_seconds: 5
