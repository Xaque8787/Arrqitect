description: >
  Pre-remove cleanup for Prowlarr.
  The job runner fires a provider_removed event which triggers
  reconcile hooks on all consumers (Radarr, Sonarr). Each consumer's
  pre_remove hook handles its own self-deregistration from Prowlarr
  before this point. This hook is a no-op.

steps:
  - id: log_removing
    type: log
    message: "Prowlarr pre-remove: consumers will self-deregister via their own pre_remove hooks"
    timeout_seconds: 5
