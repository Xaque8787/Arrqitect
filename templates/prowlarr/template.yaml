schema_version: 2

app:
  id: prowlarr
  name: Prowlarr
  version: "1.0.0"
  flavor: linuxserver
  allow_custom_env: true
  allow_custom_storage: true

description: Indexer manager and proxy for Radarr, Sonarr and other *arr apps.
icon_url: https://raw.githubusercontent.com/Prowlarr/Prowlarr/develop/Logo/256.png

services:
  - id: prowlarr
    image:
      repository: lscr.io/linuxserver/prowlarr
      tag: 2.3.5.5327-ls145

    networking:
      ports:
        - id: web_ui
          listen_port: 9696
          protocol: http
          reachability: external

    storage:
      - id: config
        persistence: persistent
        sharing: private
        mutability: read-write
        durability: configuration
        container_path: /config

    lifecycle:
      restart:
        behavior: persistent

provides:
  - key: prowlarr.url_internal
    type: endpoint
    sensitive: false
    rotates: false

  - key: prowlarr.url_external
    type: endpoint
    sensitive: false
    rotates: false

  - key: prowlarr.api_key
    type: credential
    sensitive: true
    rotates: true

consumes: []

config_schema:
  - id: web_ui_port
    label: Web UI Port
    type: port
    default: 9696
    binds_to: services.prowlarr.networking.ports.web_ui.published_port
    required: true
    visibility: visible
    source: user

  - id: config_path
    label: Config Path
    type: storage_path
    default: ./config
    binds_to: services.prowlarr.storage.config.host_path
    required: true
    visibility: visible
    source: user

  - id: web_ui_port_env
    label: Web UI Port (env)
    type: port
    default: 9696
    binds_to: services.prowlarr.env.WEB_UI_PORT
    required: false
    visibility: hidden
    source: platform

hooks:
  post_install: hooks/post_install.yaml
  pre_remove: hooks/pre_remove.yaml
