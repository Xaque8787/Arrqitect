schema_version: 1
slug: prowlarr
name: Prowlarr
version: 1.0.0
description: Indexer manager and proxy for Radarr, Sonarr and other *arr apps.
icon_url: https://raw.githubusercontent.com/Prowlarr/Prowlarr/develop/Logo/256.png

provides:
  - indexer

consumes: []

config_schema:
  - key: host_port
    label: Host Port
    type: number
    default: 9696
    env_key: HOST_PORT
    required: true

  - key: config
    label: Config
    type: volume_mount
    default: ./config
    container_path: /config
    env_key: CONFIG_PATH
    required: true

hooks:
  post_install: hooks/post_install.yaml
  pre_remove: hooks/pre_remove.yaml

compose: |
  services:
    prowlarr:
      image: lscr.io/linuxserver/prowlarr:latest
      container_name: prowlarr
      environment:
        - PUID=${PUID:-1000}
        - PGID=${PGID:-1000}
        - TZ=${TZ:-UTC}
      volumes:
        - ${CONFIG_PATH:-./config}:/config
      ports:
        - ${HOST_PORT:-9696}:9696
      restart: unless-stopped
