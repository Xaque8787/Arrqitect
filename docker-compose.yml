services:
  arrqitect:
    build: .
    container_name: arrqitect
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./templates:/app/templates
      - ./compose:/compose
      - ${DATA_DIR:-./data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - HOST_COMPOSE_DIR=${HOST_COMPOSE_DIR}
      - DB_PATH=/data/arrqitect.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
