services:
  arrqitect:
    image: ghcr.io/xaque8787/arrqitect:latest
    container_name: arrqitect
    restart: unless-stopped
    ports:
      - "${ARRQITECT_PORT:-2112}:2112"
    volumes:
      - ${COMPOSE_DIR:-./compose}:/compose
      - ${DATA_DIR:-./data}:/data
      - ${MEDIA_DIR:-./media}:/media
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - HOST_COMPOSE_DIR=${HOST_COMPOSE_DIR}
      - HOST_MEDIA_DIR=${HOST_MEDIA_DIR}
      - DB_PATH=/data/arrqitect.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
